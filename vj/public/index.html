<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VIJAY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #0f0;
      font: 12px/1.4 monospace;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      text-shadow: 0 0 4px #0f0;
      z-index: 10;
    }
    #hud.visible { opacity: 0.8; }
    #hud .label { color: #888; }
    #hud .value { color: #0f0; }
    #hud .hot { color: #f00; }

    /* Agent CoT overlay — bottom-right rolling log */
    #cot {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 420px;
      max-height: 40vh;
      color: #0f0;
      font: 13px/1.5 'Courier New', monospace;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    #cot .line {
      opacity: 0;
      animation: cotFadeIn 0.3s ease forwards;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 2px 0;
      text-shadow: 0 0 6px #0f0, 0 0 12px rgba(0,255,0,0.3);
    }
    #cot .line.thinking {
      color: #888;
      font-style: italic;
    }
    #cot .line.action {
      color: #0ff;
      text-shadow: 0 0 6px #0ff, 0 0 12px rgba(0,255,255,0.3);
    }
    #cot .line.fading {
      animation: cotFadeOut 2s ease forwards;
    }
    #cot .prefix {
      color: #555;
    }
    @keyframes cotFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 0.9; transform: translateY(0); }
    }
    @keyframes cotFadeOut {
      from { opacity: 0.9; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="cot"></div>
  <div id="hud">
    <div>VIJAY <span class="label">v1</span></div>
    <div><span class="label">FX:</span> <span id="hud-effect" class="value">feedback</span></div>
    <div><span class="label">INT:</span> <span id="hud-intensity" class="value">0.5</span></div>
    <div><span class="label">FB:</span> <span id="hud-feedback" class="value">0.85</span></div>
    <div><span class="label">IMG:</span> <span id="hud-image" class="value">-</span></div>
    <div><span class="label">IMG2:</span> <span id="hud-image2" class="value">-</span></div>
    <div><span class="label">MIX:</span> <span id="hud-blend" class="value">off</span></div>
    <div><span class="label">MODE:</span> <span id="hud-mode" class="value">manual</span></div>
    <div><span class="label">CAM:</span> <span id="hud-camera" class="value">off</span></div>
    <div><span class="label">FPS:</span> <span id="hud-fps" class="value">0</span></div>
    <div style="margin-top:8px;color:#555">H = toggle HUD</div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- App modules -->
  <script src="js/shaders/feedback.frag.js"></script>
  <script src="js/shaders/glitch.frag.js"></script>
  <script src="js/shaders/kaleidoscope.frag.js"></script>
  <script src="js/shaders/colorshift.frag.js"></script>
  <script src="js/shaders/noise.frag.js"></script>
  <script src="js/shaders/vhs.frag.js"></script>
  <script src="js/shaders/pixelate.frag.js"></script>
  <script src="js/shaders/mirror.frag.js"></script>
  <script src="js/shaders/premix.frag.js"></script>
  <script src="js/shaders/composite.frag.js"></script>
  <script src="js/connection.js"></script>
  <script src="js/images.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/cot.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
